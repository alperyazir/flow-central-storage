name: CI

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main]

jobs:
  lint-backend:
    name: API Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install ruff==0.13.0
      - run: ruff check . --exclude alembic
      - run: ruff format --check . --exclude alembic

  build-frontend:
    name: Admin Panel Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/admin-panel
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/admin-panel/package-lock.json
      - run: npm ci
      - run: npx eslint "src/**/*.{ts,tsx}" || true
      - run: npm run build

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pip-audit
      - run: cd apps/api && pip install -e . && pip-audit || true
        continue-on-error: true
      - run: cd apps/admin-panel && npm ci && npm audit --audit-level=high || true
        continue-on-error: true

  build-docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint-backend, build-frontend]
    steps:
      - uses: actions/checkout@v6
      - run: docker build -t dcs-api ./apps/api
      - run: docker build -t dcs-admin-panel ./apps/admin-panel
