name: Deploy to Production

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/${{ github.repository }}/api
  ADMIN_IMAGE: ghcr.io/${{ github.repository }}/admin-panel

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/api
          push: true
          tags: |
            ${{ env.API_IMAGE }}:${{ github.sha }}
            ${{ env.API_IMAGE }}:latest

      - name: Build and push admin panel image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/admin-panel
          push: true
          tags: |
            ${{ env.ADMIN_IMAGE }}:${{ github.sha }}
            ${{ env.ADMIN_IMAGE }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            # Login to GHCR
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull latest images
            docker pull ghcr.io/${{ github.repository }}/api:latest
            docker pull ghcr.io/${{ github.repository }}/admin-panel:latest

            # Update and restart services
            cd /opt/flow-central-storage
            docker compose -f infrastructure/docker-compose.prod.yml up -d --no-build
            docker image prune -f

            echo "✅ Flow Central Storage deployed at $(date)"
