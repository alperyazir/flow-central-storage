services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dream_central
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changethis}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dream_central"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes

  api:
    build:
      context: ../apps/api
    env_file:
      - ../apps/api/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      seaweedfs-s3:
        condition: service_healthy
    volumes:
      - ../apps/api:/app
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8080 --reload"

  worker:
    build:
      context: ../apps/api
    env_file:
      - ../apps/api/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      seaweedfs-s3:
        condition: service_healthy
    volumes:
      - ../apps/api:/app
    command: python -m app.services.queue.worker

  seaweedfs-master:
    image: chrislusf/seaweedfs:latest
    command: "master -ip=seaweedfs-master -ip.bind=0.0.0.0 -mdir=/data"
    ports:
      - "9333:9333"
    volumes:
      - seaweedfs_master_data:/data

  seaweedfs-volume:
    image: chrislusf/seaweedfs:latest
    command: "volume -mserver=seaweedfs-master:9333 -ip.bind=0.0.0.0 -port=8080 -dir=/data"
    depends_on:
      - seaweedfs-master
    volumes:
      - seaweedfs_volume_data:/data

  seaweedfs-filer:
    image: chrislusf/seaweedfs:latest
    command: "filer -master=seaweedfs-master:9333 -ip.bind=0.0.0.0"
    ports:
      - "8888:8888"
    depends_on:
      - seaweedfs-master
      - seaweedfs-volume

  seaweedfs-s3:
    image: chrislusf/seaweedfs:latest
    command: "s3 -filer=seaweedfs-filer:8888 -ip.bind=0.0.0.0 -port=8333"
    ports:
      - "8333:8333"
    depends_on:
      - seaweedfs-filer
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8333 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  nginx:
    image: nginx:1.27
    depends_on:
      - api
    ports:
      - "8081:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro

  prometheus:
    image: prom/prometheus:latest
    depends_on:
      - api
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command: --config.file=/etc/prometheus/prometheus.yml
    ports:
      - "9091:9090"
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:10.4.3
    depends_on:
      - prometheus
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/dashboards:/var/lib/grafana/dashboards:ro
    profiles:
      - monitoring

  admin-panel:
    build:
      context: ../apps/admin-panel
    depends_on:
      - api
    ports:
      - "5174:80"
    profiles:
      - prod

  admin-panel-dev:
    image: node:20-alpine
    working_dir: /app
    depends_on:
      - api
    ports:
      - "5174:5173"
    volumes:
      - ../apps/admin-panel:/app
      - admin_panel_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      - VITE_API_BASE_URL=http://localhost:8081

volumes:
  postgres_data:
  redis_data:
  seaweedfs_master_data:
  seaweedfs_volume_data:
  grafana_data:
  admin_panel_node_modules:
