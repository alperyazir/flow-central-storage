services:

  postgres:
    image: postgres:16-alpine
    command: >
      postgres
        -c max_connections=${FCS_PG_MAX_CONNECTIONS:-100}
        -c shared_buffers=${FCS_PG_SHARED_BUFFERS:-256MB}
        -c effective_cache_size=${FCS_PG_EFFECTIVE_CACHE:-1GB}
        -c work_mem=${FCS_PG_WORK_MEM:-4MB}
        -c maintenance_work_mem=${FCS_PG_MAINT_WORK_MEM:-64MB}
        -c statement_timeout=${FCS_PG_STATEMENT_TIMEOUT:-30000}
        -c random_page_cost=1.1
        -c effective_io_concurrency=200
    environment:
      POSTGRES_DB: flow_central
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changethis}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d flow_central"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    command: redis-server --maxmemory ${FCS_REDIS_MAXMEMORY:-128mb} --maxmemory-policy allkeys-lru --appendonly yes

  pgbouncer:
    image: edoburu/pgbouncer:v1.23.1-p2
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "6433:6432"
    volumes:
      - ./pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./pgbouncer/entrypoint.sh:/entrypoint.sh:ro
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changethis}
    entrypoint: /entrypoint.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 6432"]
      interval: 10s
      retries: 5
      start_period: 5s
      timeout: 5s

  api:
    build:
      context: ../apps/api
    env_file:
      - ../apps/api/.env
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../apps/api:/app
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8080 --reload"

  worker:
    build:
      context: ../apps/api
    env_file:
      - ../apps/api/.env
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../apps/api:/app
    command: python -m app.services.queue.worker

  nginx:
    image: nginx:1.27
    depends_on:
      - api
    ports:
      - "8081:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro

  prometheus:
    image: prom/prometheus:latest
    depends_on:
      - api
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command: --config.file=/etc/prometheus/prometheus.yml
    ports:
      - "9091:9090"
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:10.4.3
    depends_on:
      - prometheus
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/dashboards:/var/lib/grafana/dashboards:ro
    profiles:
      - monitoring

  admin-panel:
    build:
      context: ../apps/admin-panel
    depends_on:
      - api
    ports:
      - "5174:80"
    profiles:
      - prod

  admin-panel-dev:
    image: node:20-alpine
    working_dir: /app
    depends_on:
      - api
    ports:
      - "5174:5173"
    volumes:
      - ../apps/admin-panel:/app
      - admin_panel_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      - VITE_API_BASE_URL=http://localhost:8081

volumes:
  postgres_data:
  redis_data:
  grafana_data:
  admin_panel_node_modules:
